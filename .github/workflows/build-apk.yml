name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: apk-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          npm install --fetch-timeout=120000 2>&1 || \
          npm install --fetch-timeout=180000 --prefer-online 2>&1 || \
          npm install --registry https://registry.npmmirror.com 2>&1

      - name: Build Next.js (static export)
        run: npm run build

      - name: Copy web build to Android project
        run: npx cap copy

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
        working-directory: android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KolamRenang-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
